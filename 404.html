<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – OzzyPeps</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>(function(){var t=localStorage.getItem('ozzypeps_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
</head>
<body>
  <section style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;text-align:center;">
    <div style="max-width:520px;">
      <div style="font-size:96px;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;">404</div>
      <div class="section-label" style="margin-bottom:14px;">Compound Not Found</div>
      <h1 style="font-size:28px;font-weight:800;margin-bottom:12px;">This page doesn't exist</h1>
      <p style="color:var(--text-secondary);font-size:15px;line-height:1.7;margin-bottom:28px;">
        The page you're looking for has been moved or never existed. Try heading back to the catalogue.
      </p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <a href="/" class="btn btn-primary">← Back Home</a>
        <a href="/products.html" class="btn btn-outline">Browse Products</a>
      </div>
    </div>
  </section>
</body>
</html>
