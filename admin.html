<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Admin – OzzyPeps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #090e1a;
      --bg-card:   #0f1629;
      --bg-input:  #141c30;
      --border:    rgba(255,255,255,.07);
      --border-h:  rgba(0,212,255,.25);
      --accent:    #00d4ff;
      --accent2:   #7b5ea7;
      --green:     #00e676;
      --red:       #ff4d6d;
      --orange:    #ff9800;
      --txt:       #e8eaf0;
      --txt2:      #8892a4;
      --txt3:      #4a5568;
      --radius:    10px;
      --shadow:    0 4px 24px rgba(0,0,0,.5);
    }

    body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

    /* ── Login overlay ── */
    #loginOverlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .login-box {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      padding: 48px 40px; width: 100%; max-width: 400px; text-align: center;
    }
    .login-logo { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .login-logo span { color: var(--accent); }
    .login-sub { color: var(--txt2); font-size: 13px; margin-bottom: 32px; }

    /* ── Shared inputs ── */
    input, select, textarea {
      background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--txt); font-family: inherit; font-size: 13px;
      padding: 10px 14px; width: 100%; outline: none; transition: border .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--txt2); margin-bottom: 6px; }

    button {
      cursor: pointer; font-family: inherit; font-weight: 600; border: none;
      border-radius: var(--radius); padding: 10px 20px; transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #000; font-size: 14px; }
    .btn-primary:hover { background: #29dcff; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--txt); }
    .btn-ghost:hover { border-color: var(--border-h); color: var(--accent); }
    .btn-danger { background: rgba(255,77,109,.12); border: 1px solid rgba(255,77,109,.3); color: var(--red); }
    .btn-danger:hover { background: rgba(255,77,109,.2); }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    /* ── Top bar ── */
    .topbar {
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-logo { font-weight: 800; font-size: 16px; }
    .topbar-logo span { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-env { font-size: 11px; color: var(--txt3); }

    /* ── Layout ── */
    .page { padding: 32px 24px; max-width: 1100px; margin: 0 auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-size: 22px; font-weight: 800; }

    /* ── Stats row ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .stat-num { font-size: 28px; font-weight: 800; }
    .stat-label { font-size: 11px; color: var(--txt2); margin-top: 4px; text-transform: uppercase; letter-spacing: .8px; }
    .green { color: var(--green); }
    .orange { color: var(--orange); }
    .accent { color: var(--accent); }
    .red { color: var(--red); }

    /* ── Orders table ── */
    .orders-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
    .table-search { max-width: 280px; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--txt2); padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); background: rgba(255,255,255,.015); }
    td { padding: 13px 16px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .order-id { font-weight: 700; font-family: monospace; font-size: 13px; color: var(--accent); }
    .order-email { color: var(--txt2); font-size: 12px; }
    .order-products { color: var(--txt); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Status badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .badge-processing { background: rgba(255,152,0,.12); color: var(--orange); }
    .badge-packed     { background: rgba(0,212,255,.1);   color: var(--accent); }
    .badge-dispatched { background: rgba(123,94,167,.15); color: #b39ddb; }
    .badge-shipped    { background: rgba(123,94,167,.15); color: #b39ddb; }
    .badge-delivered  { background: rgba(0,230,118,.1);   color: var(--green); }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--txt2); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--txt); margin-bottom: 6px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; width: 100%; max-width: 680px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 24px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg-card); z-index: 1;
    }
    .modal-title { font-size: 16px; font-weight: 800; }
    .modal-close { background: none; border: none; color: var(--txt2); font-size: 20px; cursor: pointer; padding: 4px 8px; }
    .modal-close:hover { color: var(--txt); }
    .modal-body { padding: 24px; }
    .form-row { display: grid; gap: 16px; margin-bottom: 16px; }
    .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

    .steps-preview { margin-top: 6px; }
    .step-preview-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 12px; }
    .step-dot { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; }
    .step-dot.done    { background: var(--green); color: #000; }
    .step-dot.active  { background: var(--accent); color: #000; }
    .step-dot.pending { background: var(--bg-input); color: var(--txt3); border: 1px solid var(--border); }
    .step-preview-label { flex: 1; }
    .step-preview-date  { color: var(--txt2); font-size: 11px; }

    /* ── Toasts ── */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 18px; font-size: 13px; font-weight: 500;
      animation: slideIn .2s ease; box-shadow: var(--shadow); min-width: 240px;
    }
    .toast.success { border-color: rgba(0,230,118,.3); color: var(--green); }
    .toast.error   { border-color: rgba(255,77,109,.3); color: var(--red); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

    .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .form-row.cols-2, .form-row.cols-3 { grid-template-columns: 1fr; }
      th:nth-child(3), td:nth-child(3),
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Login Overlay ───────────────────────────────────────── -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">Ozzy<span>Peps</span></div>
    <div class="login-sub">Order Management Dashboard</div>
    <div class="form-group" style="margin-bottom:14px;">
      <label for="loginKey">Admin Key</label>
      <input type="password" id="loginKey" placeholder="Enter your admin key" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <div class="form-group" style="margin-bottom:14px;">
      <label for="apiBase">API Base URL</label>
      <input type="text" id="apiBase" placeholder="https://ozzypeps.workers.dev" />
    </div>
    <button class="btn-primary" style="width:100%;padding:12px;" onclick="doLogin()">Sign In →</button>
    <div id="loginError" style="color:var(--red);font-size:12px;margin-top:12px;display:none;"></div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────────────── -->
<div id="app" style="display:none;">

  <div class="topbar">
    <div class="topbar-logo">Ozzy<span>Peps</span> <span style="color:var(--txt2);font-weight:500;font-size:13px;">Admin</span></div>
    <div class="topbar-right">
      <span class="topbar-env" id="topbarUrl"></span>
      <button class="btn-ghost btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="page">

    <div class="page-header">
      <div class="page-title">Orders</div>
      <button class="btn-primary" onclick="openNewOrderModal()">+ New Order</button>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-num accent" id="statTotal">—</div><div class="stat-label">Total Orders</div></div>
      <div class="stat-card"><div class="stat-num orange" id="statProcessing">—</div><div class="stat-label">Processing</div></div>
      <div class="stat-card"><div class="stat-num accent" id="statShipped">—</div><div class="stat-label">In Transit</div></div>
      <div class="stat-card"><div class="stat-num green" id="statDelivered">—</div><div class="stat-label">Delivered</div></div>
    </div>

    <div class="orders-card">
      <div class="table-header">
        <strong style="font-size:15px;">All Orders</strong>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <input class="table-search" type="text" placeholder="Search order ID or email…" oninput="filterTable(this.value)" />
          <button class="btn-ghost btn-sm" onclick="loadOrders()"><span id="refreshIcon">↻</span> Refresh</button>
        </div>
      </div>
      <div id="tableWrap">
        <div class="empty"><div class="loader"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Order Modal ─────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="orderModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New Order</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-row cols-2">
        <div class="form-group">
          <label for="fId">Order ID *</label>
          <input type="text" id="fId" placeholder="OP-2026-00001" />
        </div>
        <div class="form-group">
          <label for="fEmail">Customer Email *</label>
          <input type="email" id="fEmail" placeholder="customer@email.com" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fProducts">Products Ordered</label>
          <input type="text" id="fProducts" placeholder="e.g. BPC-157 (5mg) × 2, TB-500 (5mg) × 1" />
        </div>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label for="fStatus">Status *</label>
          <select id="fStatus" onchange="updateStepsPreview()">
            <option value="processing">Processing</option>
            <option value="packed">Packed &amp; Ready</option>
            <option value="dispatched">Dispatched</option>
            <option value="shipped">Shipped / In Transit</option>
            <option value="delivered">Delivered</option>
          </select>
        </div>
        <div class="form-group">
          <label for="fStatusLabel">Status Label (shown to customer)</label>
          <input type="text" id="fStatusLabel" placeholder="e.g. In Transit" />
        </div>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label for="fCarrier">Carrier</label>
          <input type="text" id="fCarrier" placeholder="Australia Post Express" />
        </div>
        <div class="form-group">
          <label for="fTracking">Tracking Number</label>
          <input type="text" id="fTracking" placeholder="1Z999AA10123456789" />
        </div>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label for="fTrackingUrl">Tracking URL (optional)</label>
          <input type="url" id="fTrackingUrl" placeholder="https://auspost.com.au/…" />
        </div>
        <div class="form-group">
          <label for="fEta">ETA / Delivery Date</label>
          <input type="text" id="fEta" placeholder="e.g. 15 May 2026" />
        </div>
      </div>

      <hr style="border:none;border-top:1px solid var(--border);margin:20px 0;" />
      <div style="font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--txt2);margin-bottom:10px;">Timeline Dates (optional — auto-set if blank)</div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label for="fConfirmedAt">Confirmed / Payment</label>
          <input type="text" id="fConfirmedAt" placeholder="12 May 2026 · 9:30 AM" />
        </div>
        <div class="form-group">
          <label for="fPackedAt">Packed</label>
          <input type="text" id="fPackedAt" placeholder="12 May 2026 · 2:00 PM" />
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label for="fDispatchedAt">Dispatched / In Transit</label>
          <input type="text" id="fDispatchedAt" placeholder="13 May 2026 · 9:00 AM" />
        </div>
        <div class="form-group">
          <label for="fDeliveredAt">Delivered</label>
          <input type="text" id="fDeliveredAt" placeholder="15 May 2026 · 11:22 AM" />
        </div>
      </div>

      <hr style="border:none;border-top:1px solid var(--border);margin:20px 0;" />
      <div style="font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--txt2);margin-bottom:10px;">Timeline Preview</div>
      <div id="stepsPreview" class="steps-preview"></div>

    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-danger btn-sm" id="btnDelete" style="display:none;margin-right:auto;" onclick="deleteOrder()">Delete Order</button>
      <button class="btn-primary" onclick="saveOrder()" id="btnSave">Save Order</button>
    </div>
  </div>
</div>

<!-- ── Toast container ── -->
<div class="toast-container" id="toasts"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let ADMIN_KEY = '';
  let API_BASE  = '';
  let allOrders = [];
  let editingId = null;

  // ── Auth ───────────────────────────────────────────────────────────────────
  function doLogin() {
    const key = document.getElementById('loginKey').value.trim();
    const base = document.getElementById('apiBase').value.trim().replace(/\/$/, '');
    if (!key || !base) {
      showLoginError('Please enter both the admin key and API base URL.');
      return;
    }
    ADMIN_KEY = key;
    API_BASE  = base;
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('topbarUrl').textContent = base;
    loadOrders();
  }

  function doLogout() {
    ADMIN_KEY = ''; API_BASE = '';
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginKey').value = '';
  }

  function showLoginError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg; el.style.display = 'block';
  }

  // ── API calls ──────────────────────────────────────────────────────────────
  async function api(path, opts = {}) {
    const res = await fetch(API_BASE + path, {
      ...opts,
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY, ...(opts.headers || {}) }
    });
    if (res.status === 401) { doLogout(); throw new Error('Unauthorized'); }
    return res;
  }

  // ── Load & render orders ───────────────────────────────────────────────────
  async function loadOrders() {
    document.getElementById('refreshIcon').innerHTML = '<span class="loader" style="vertical-align:middle;"></span>';
    try {
      const res = await api('/api/orders');
      if (!res.ok) throw new Error(await res.text());
      allOrders = await res.json();
      renderTable(allOrders);
      renderStats(allOrders);
    } catch (e) {
      toast('Failed to load orders: ' + e.message, 'error');
      document.getElementById('tableWrap').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load orders</div><div>${e.message}</div></div>`;
    } finally {
      document.getElementById('refreshIcon').textContent = '↻';
    }
  }

  function renderStats(orders) {
    document.getElementById('statTotal').textContent = orders.length;
    document.getElementById('statProcessing').textContent =
      orders.filter(o => ['processing','packed','dispatched'].includes(o.status)).length;
    document.getElementById('statShipped').textContent =
      orders.filter(o => o.status === 'shipped').length;
    document.getElementById('statDelivered').textContent =
      orders.filter(o => o.status === 'delivered').length;
  }

  function renderTable(orders) {
    if (!orders.length) {
      document.getElementById('tableWrap').innerHTML =
        `<div class="empty"><div class="empty-icon">📦</div><div class="empty-title">No orders yet</div><div>Create your first order to get started.</div></div>`;
      return;
    }
    let rows = orders.map(o => `
      <tr onclick="openEditOrderModal('${o.id}')" style="cursor:pointer;">
        <td><div class="order-id">${o.id}</div><div class="order-email">${o.email}</div></td>
        <td><span class="badge badge-${o.status}">${statusDot(o.status)} ${o.statusLabel || o.status}</span></td>
        <td class="order-products">${o.products || '—'}</td>
        <td style="color:var(--txt2);font-size:12px;">${o.carrier || '—'}</td>
        <td style="color:var(--txt2);font-size:12px;">${o.tracking || '—'}</td>
        <td style="color:var(--txt2);font-size:12px;">${o.eta || '—'}</td>
      </tr>`).join('');

    document.getElementById('tableWrap').innerHTML = `
      <table>
        <thead><tr>
          <th>Order / Email</th><th>Status</th><th>Products</th>
          <th>Carrier</th><th>Tracking</th><th>ETA</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function filterTable(q) {
    q = q.toLowerCase();
    const filtered = allOrders.filter(o =>
      o.id.toLowerCase().includes(q) || o.email.toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  function statusDot(s) {
    return { processing: '⏳', packed: '📦', dispatched: '🚀', shipped: '🚚', delivered: '✅' }[s] || '•';
  }

  // ── Modal ──────────────────────────────────────────────────────────────────
  function openNewOrderModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'New Order';
    document.getElementById('btnDelete').style.display = 'none';
    clearForm();
    suggestNextOrderId();
    updateStepsPreview();
    document.getElementById('orderModal').classList.remove('hidden');
  }

  function openEditOrderModal(id) {
    const o = allOrders.find(x => x.id === id);
    if (!o) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Edit Order · ' + id;
    document.getElementById('btnDelete').style.display = 'inline-block';
    populateForm(o);
    updateStepsPreview();
    document.getElementById('orderModal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('orderModal').classList.add('hidden');
    editingId = null;
  }

  function clearForm() {
    ['fId','fEmail','fProducts','fStatusLabel','fCarrier','fTracking',
     'fTrackingUrl','fEta','fConfirmedAt','fPackedAt','fDispatchedAt','fDeliveredAt']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('fStatus').value = 'processing';
  }

  function populateForm(o) {
    document.getElementById('fId').value          = o.id || '';
    document.getElementById('fEmail').value       = o.email || '';
    document.getElementById('fProducts').value    = o.products || '';
    document.getElementById('fStatus').value      = o.status || 'processing';
    document.getElementById('fStatusLabel').value = o.statusLabel || '';
    document.getElementById('fCarrier').value     = o.carrier || '';
    document.getElementById('fTracking').value    = o.tracking || '';
    document.getElementById('fTrackingUrl').value = o.trackingUrl || '';
    document.getElementById('fEta').value         = o.eta || '';
    document.getElementById('fConfirmedAt').value = o.confirmedAt || '';
    document.getElementById('fPackedAt').value    = o.packedAt || '';
    document.getElementById('fDispatchedAt').value= o.dispatchedAt || '';
    document.getElementById('fDeliveredAt').value = o.deliveredAt || '';
  }

  function suggestNextOrderId() {
    const year = new Date().getFullYear();
    const nums = allOrders
      .map(o => { const m = o.id.match(/OP-\d{4}-(\d+)/); return m ? parseInt(m[1]) : 0; })
      .filter(n => n > 0);
    const next = (nums.length ? Math.max(...nums) : 0) + 1;
    document.getElementById('fId').value = `OP-${year}-${String(next).padStart(5, '0')}`;
  }

  // ── Save & Delete ──────────────────────────────────────────────────────────
  async function saveOrder() {
    const id    = document.getElementById('fId').value.trim().toUpperCase();
    const email = document.getElementById('fEmail').value.trim().toLowerCase();
    if (!id || !email) { toast('Order ID and email are required.', 'error'); return; }

    const status = document.getElementById('fStatus').value;
    const statusLabelMap = { processing: 'Processing', packed: 'Packed & Ready', dispatched: 'Dispatched', shipped: 'In Transit', delivered: 'Delivered' };

    const order = {
      id, email,
      products:    document.getElementById('fProducts').value.trim() || undefined,
      status,
      statusLabel: document.getElementById('fStatusLabel').value.trim() || statusLabelMap[status],
      carrier:     document.getElementById('fCarrier').value.trim() || undefined,
      tracking:    document.getElementById('fTracking').value.trim() || undefined,
      trackingUrl: document.getElementById('fTrackingUrl').value.trim() || undefined,
      eta:         document.getElementById('fEta').value.trim() || undefined,
      confirmedAt: document.getElementById('fConfirmedAt').value.trim() || undefined,
      packedAt:    document.getElementById('fPackedAt').value.trim() || undefined,
      dispatchedAt:document.getElementById('fDispatchedAt').value.trim() || undefined,
      deliveredAt: document.getElementById('fDeliveredAt').value.trim() || undefined,
    };

    document.getElementById('btnSave').disabled = true;
    document.getElementById('btnSave').textContent = 'Saving…';

    try {
      const res = await api('/api/orders', { method: 'POST', body: JSON.stringify(order) });
      if (!res.ok) throw new Error(await res.text());
      toast('Order saved: ' + id, 'success');
      closeModal();
      loadOrders();
    } catch (e) {
      toast('Save failed: ' + e.message, 'error');
    } finally {
      document.getElementById('btnSave').disabled = false;
      document.getElementById('btnSave').textContent = 'Save Order';
    }
  }

  async function deleteOrder() {
    if (!editingId) return;
    if (!confirm(`Delete order ${editingId}? This cannot be undone.`)) return;

    try {
      const res = await api(`/api/orders/${editingId}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(await res.text());
      toast('Order deleted: ' + editingId, 'success');
      closeModal();
      loadOrders();
    } catch (e) {
      toast('Delete failed: ' + e.message, 'error');
    }
  }

  // ── Steps preview ──────────────────────────────────────────────────────────
  function updateStepsPreview() {
    const status = document.getElementById('fStatus').value;
    const confirmedAt  = document.getElementById('fConfirmedAt').value  || 'Auto';
    const packedAt     = document.getElementById('fPackedAt').value     || 'Auto';
    const dispatchedAt = document.getElementById('fDispatchedAt').value || 'Auto';
    const deliveredAt  = document.getElementById('fDeliveredAt').value  || 'Auto';

    const STATUS_MAP = { processing: 2, packed: 3, dispatched: 4, shipped: 4, delivered: 6 };
    const doneUntil = STATUS_MAP[status] ?? 2;

    const steps = [
      { label: 'Order Confirmed',  date: confirmedAt },
      { label: 'Payment Received', date: confirmedAt },
      { label: 'Packed & Ready',   date: packedAt },
      { label: 'Dispatched',       date: dispatchedAt },
      { label: 'In Transit',       date: dispatchedAt },
      { label: 'Delivered',        date: status === 'delivered' ? deliveredAt : 'Pending' },
    ];

    const html = steps.map((s, i) => {
      let state;
      if (i < doneUntil)      state = 'done';
      else if (i === doneUntil && status !== 'delivered') state = 'active';
      else                     state = 'pending';
      const icon = state === 'done' ? '✓' : state === 'active' ? '●' : '○';
      return `<div class="step-preview-item">
        <div class="step-dot ${state}">${icon}</div>
        <div class="step-preview-label">${s.label}</div>
        <div class="step-preview-date">${s.date}</div>
      </div>`;
    }).join('');

    document.getElementById('stepsPreview').innerHTML = html;
  }

  // ── Toasts ─────────────────────────────────────────────────────────────────
  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // Close modal on overlay click
  document.getElementById('orderModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
</script>
</body>
</html>
